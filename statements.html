<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>五源兴 · 财务报表</title>
<link rel="stylesheet" href="/finance/css/style.css?v=20260622.1">
<style>
body{background:var(--bg);padding:20px}
.stmt-container{max-width:900px;margin:0 auto}
.stmt-header{text-align:center;margin-bottom:24px}
.stmt-header h1{font-size:1.3rem;font-weight:700}
.stmt-header p{font-size:0.75rem;color:var(--text-light);margin-top:4px}
.stmt-nav{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.stmt-btn{padding:8px 20px;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;font-size:0.78rem;font-weight:600;font-family:var(--font);transition:all 0.15s}
.stmt-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.stmt-btn:hover{border-color:var(--primary)}
.stmt-panel{display:none}
.stmt-panel.active{display:block}
.stmt-table{width:100%;border-collapse:collapse;font-size:0.78rem;background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.stmt-table th{background:#faf8f5;padding:8px 12px;text-align:left;font-weight:600;font-size:0.7rem;border-bottom:2px solid var(--border);letter-spacing:0.02em}
.stmt-table td{padding:6px 12px;border-bottom:1px solid #f0ede8}
.stmt-table .item{font-weight:600}
.stmt-table .sub-item{padding-left:24px;color:var(--text-light)}
.stmt-table .total-item{font-weight:700;border-top:2px solid var(--border);background:#faf8f5}
.stmt-table .amt{text-align:right;font-family:'Courier New',monospace;font-weight:600;white-space:nowrap}
.stmt-table .pos{color:var(--green)}
.stmt-table .neg{color:var(--red)}
.stmt-note{font-size:0.7rem;color:var(--text-light);margin-top:12px;padding:10px 14px;border:1px dashed var(--border);border-radius:4px;line-height:1.6}
.print-bar{text-align:center;margin-top:20px;padding:16px}
.print-bar button{padding:10px 28px;background:var(--primary-dark);color:#fff;border:none;border-radius:4px;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:var(--font)}
@media print{.stmt-nav,.print-bar{display:none!important}.stmt-panel{display:block!important}}
</style>
</head>
<body>
  <!-- 顶部导航 -->
  <header class="top-bar">
    <div class="top-inner">
      <div class="logo">
        <span class="logo-icon">🌾</span>
        <div>
          <h1>五源兴农业</h1>
          <p class="logo-sub">财务报表</p>
        </div>
      </div>
      <div class="top-info">
        <a href="/finance/" class="top-link">← 返回首页</a>
      </div>
    </div>
  </header>

<div class="stmt-container" style="padding-top:20px">
  <div class="stmt-header">
    <h1>🌾 凉山州五源兴农业科技有限公司</h1>
    <p>财务报表 · 自动生成（基于已录入数据）</p>
  </div>

  <div class="stmt-nav">
    <button class="stmt-btn active" onclick="switchStmt('pl')">📊 利润表</button>
    <button class="stmt-btn" onclick="switchStmt('bs')">📋 资产负债表</button>
    <button class="stmt-btn" onclick="switchStmt('cf')">💰 现金流量表</button>
  </div>

  <!-- 利润表 -->
  <div class="stmt-panel active" id="pl">
    <table class="stmt-table">
      <thead><tr><th style="width:60%">项目</th><th style="width:40%" class="amt">金额</th></tr></thead>
      <tbody id="plBody"></tbody>
    </table>
    <div class="stmt-note">📌 利润表反映企业在一定会计期间的经营成果。数据来源：收入账目、各版块支出。</div>
  </div>

  <!-- 资产负债表 -->
  <div class="stmt-panel" id="bs">
    <table class="stmt-table">
      <thead><tr><th style="width:60%">项目</th><th style="width:40%" class="amt">金额</th></tr></thead>
      <tbody id="bsBody"></tbody>
    </table>
    <div class="stmt-note">📌 资产负债表反映企业在特定日期的财务状况。数据来源：股本金、固定资产、应收账款、银行账户等。</div>
  </div>

  <!-- 现金流量表 -->
  <div class="stmt-panel" id="cf">
    <table class="stmt-table">
      <thead><tr><th style="width:60%">项目</th><th style="width:40%" class="amt">金额</th></tr></thead>
      <tbody id="cfBody"></tbody>
    </table>
    <div class="stmt-note">📌 现金流量表反映企业现金及现金等价物的流入和流出。数据来源：收支账目、备用金等。</div>
  </div>

  <div class="print-bar">
    <button onclick="window.print()">🖨️ 打印报表</button>
    <p style="font-size:0.7rem;color:var(--text-light);margin-top:6px">本报表根据系统录入数据自动生成，仅供参考</p>
  </div>
</div>

<script>
var API_BASE = window.location.pathname.startsWith('/finance/') ? '/finance' : '';

function fmt(n) { return '¥' + Number(n||0).toLocaleString('zh-CN', {minimumFractionDigits:2}); }

function switchStmt(id) {
  document.querySelectorAll('.stmt-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.stmt-panel').forEach(function(p){p.classList.remove('active')});
  document.querySelector('[onclick*="'+id+'"]').classList.add('active');
  document.getElementById(id).classList.add('active');
}

function loadData() {
  var token = localStorage.getItem('wyx_token');
  if (!token) { document.querySelector('.stmt-container').innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-light)">请先登录后台管理系统</p>'; return; }

  var sections = ['incomeExpense','capital','income','asset','receivable','salary','management','baseExpense','bankAccounts','contracts'];
  var loaded = 0;
  var data = {};

  sections.forEach(function(s) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', API_BASE + '/api/data/' + s, true);
    xhr.setRequestHeader('Authorization', 'Bearer ' + token);
    xhr.onload = function() {
      try { data[s] = JSON.parse(xhr.responseText) || []; } catch(e) { data[s] = []; }
      loaded++;
      if (loaded === sections.length) renderAll(data);
    };
    xhr.onerror = function() { data[s] = []; loaded++; if (loaded === sections.length) renderAll(data); };
    xhr.send();
  });
}

function renderAll(d) {
  // === 利润表 ===
  var totalIncome = d.income.reduce(function(s,r){return s+(r.amount||0);},0);
  var totalOpExpense = d.incomeExpense.reduce(function(s,r){return s+(r.expense||0);},0);
  var totalSalary = d.salary.reduce(function(s,r){return s+(r.amount||0);},0);
  var totalManagement = d.management.reduce(function(s,r){return s+(r.amount||0);},0);
  var totalBase = d.baseExpense.reduce(function(s,r){return s+(r.amount||0);},0);
  var totalReimburse = 0; // 报销已包含在支出中
  var totalExpense = totalOpExpense;
  var netProfit = totalIncome - totalExpense;

  var pl = document.getElementById('plBody');
  pl.innerHTML =
    '<tr><td class="item">一、营业收入</td><td class="amt pos">' + fmt(totalIncome) + '</td></tr>' +
    '<tr><td class="sub-item">公司收入</td><td class="amt">' + fmt(totalIncome) + '</td></tr>' +
    '<tr><td class="item">二、营业支出</td><td class="amt neg">' + fmt(totalExpense) + '</td></tr>' +
    '<tr><td class="sub-item">基本账户支出</td><td class="amt">' + fmt(totalOpExpense) + '</td></tr>' +
    '<tr><td class="sub-item">工资支出</td><td class="amt">' + fmt(totalSalary) + '</td></tr>' +
    '<tr><td class="sub-item">管理费用</td><td class="amt">' + fmt(totalManagement) + '</td></tr>' +
    '<tr><td class="sub-item">基地直接支出</td><td class="amt">' + fmt(totalBase) + '</td></tr>' +
    '<tr class="total-item"><td>三、净利润</td><td class="amt ' + (netProfit>=0?'pos':'neg') + '">' + fmt(netProfit) + '</td></tr>';

  // === 资产负债表 ===
  var totalCapital = d.capital.reduce(function(s,r){return s+(r.amount||0);},0);
  var totalAsset = d.asset.reduce(function(s,r){return s+(r.amount||0);},0);
  var totalReceivable = d.receivable.reduce(function(s,r){return s+(r.amount||0);},0);
  var totalBank = d.bankAccounts.reduce(function(s,r){return s+(r.balance||0);},0);
  var totalAssets = totalAsset + totalReceivable + totalBank;
  var totalEquity = totalCapital + netProfit;

  var bs = document.getElementById('bsBody');
  bs.innerHTML =
    '<tr><td class="item">一、资产</td><td class="amt pos">' + fmt(totalAssets) + '</td></tr>' +
    '<tr><td class="sub-item">固定资产</td><td class="amt">' + fmt(totalAsset) + '</td></tr>' +
    '<tr><td class="sub-item">应收账款</td><td class="amt">' + fmt(totalReceivable) + '</td></tr>' +
    '<tr><td class="sub-item">银行存款</td><td class="amt">' + fmt(totalBank) + '</td></tr>' +
    '<tr><td class="sub-item">备用金（往来）</td><td class="amt">' + fmt(d.pettyCash?d.pettyCash.reduce(function(s,r){return s+(r.amount||0);},0):0) + '</td></tr>' +
    '<tr class="total-item"><td>资产合计</td><td class="amt pos">' + fmt(totalAssets) + '</td></tr>' +
    '<tr><td style="height:8px;border:none"></td><td style="border:none"></td></tr>' +
    '<tr><td class="item">二、负债及所有者权益</td><td class="amt pos">' + fmt(totalEquity) + '</td></tr>' +
    '<tr><td class="sub-item">实收资本（股本金）</td><td class="amt">' + fmt(totalCapital) + '</td></tr>' +
    '<tr><td class="sub-item">未分配利润</td><td class="amt ' + (netProfit>=0?'pos':'neg') + '">' + fmt(netProfit) + '</td></tr>' +
    '<tr class="total-item"><td>负债及权益合计</td><td class="amt pos">' + fmt(totalEquity) + '</td></tr>';

  // === 现金流量表 ===
  var cashIn = totalIncome;
  var cashOut = totalExpense;
  var netCash = cashIn - cashOut;

  var cf = document.getElementById('cfBody');
  cf.innerHTML =
    '<tr><td class="item">一、经营活动现金流</td><td class="amt"></td></tr>' +
    '<tr><td class="sub-item">销售商品、提供劳务收到的现金</td><td class="amt pos">' + fmt(cashIn) + '</td></tr>' +
    '<tr><td class="sub-item">购买商品、接受劳务支付的现金</td><td class="amt neg">' + fmt(cashOut) + '</td></tr>' +
    '<tr><td class="sub-item">支付给职工以及为职工支付的现金</td><td class="amt neg">' + fmt(totalSalary) + '</td></tr>' +
    '<tr class="total-item"><td>经营活动现金净额</td><td class="amt ' + (netCash>=0?'pos':'neg') + '">' + fmt(netCash) + '</td></tr>' +
    '<tr><td style="height:8px;border:none"></td><td style="border:none"></td></tr>' +
    '<tr><td class="item">二、筹资活动现金流</td><td class="amt"></td></tr>' +
    '<tr><td class="sub-item">吸收投资收到的现金</td><td class="amt pos">' + fmt(totalCapital) + '</td></tr>' +
    '<tr class="total-item"><td>筹资活动现金净额</td><td class="amt pos">' + fmt(totalCapital) + '</td></tr>' +
    '<tr><td style="height:8px;border:none"></td><td style="border:none"></td></tr>' +
    '<tr class="total-item"><td>现金净增加额</td><td class="amt ' + ((netCash+totalCapital)>=0?'pos':'neg') + '">' + fmt(netCash + totalCapital) + '</td></tr>';
}

loadData();
</script>
</body>
</html>
