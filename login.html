<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>五源兴 · 登录</title>
<link rel="stylesheet" href="/finance/css/style.css?v=20260621">
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-wrap{width:100%;max-width:360px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:36px 28px 28px;box-shadow:0 8px 30px rgba(0,0,0,0.06)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo .icon{font-size:2.2rem}
.login-logo h1{font-size:1.1rem;font-weight:700;margin-top:4px}
.login-logo p{font-size:0.7rem;color:var(--text-light);margin-top:2px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.72rem;font-weight:600;margin-bottom:4px;color:var(--text)}
.form-group input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:4px;font-size:0.85rem;font-family:var(--font);transition:border-color 0.2s}
.form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(192,57,43,0.1)}
.btn-login{width:100%;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:4px;font-size:0.85rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:background 0.2s}
.btn-login:hover{background:#a03020}
.error{color:var(--red);font-size:0.75rem;font-weight:600;text-align:center;margin-top:10px;min-height:1.2em}
.loading{text-align:center;font-size:0.75rem;color:var(--text-light);margin-top:8px}
.login-footer{text-align:center;margin-top:16px;font-size:0.7rem;color:var(--text-light)}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🌾</div>
      <h1>五源兴农业</h1>
      <p>财务管理后台</p>
    </div>
    <div class="form-group"><label>用户名</label><input type="text" id="username" value="admin" autocomplete="off"></div>
    <div class="form-group"><label>密码</label><input type="password" id="password" placeholder="输入密码" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn-login" onclick="login()" id="loginBtn">登 录</button>
    <div class="error" id="loginError"></div>
    <div class="loading" id="loginLoading"></div>
  </div>
  <div class="login-footer">凉山州五源兴农业科技有限公司</div>
</div>
<script src="/finance/js/data.js?v=20260621"></script>
<script>
async function login(){
  var u=document.getElementById('username').value;
  var p=document.getElementById('password').value;
  var btn=document.getElementById('loginBtn');
  var errEl=document.getElementById('loginError');
  var loadEl=document.getElementById('loginLoading');
  errEl.textContent='';loadEl.textContent='登录中...';btn.disabled=true;btn.textContent='⏳';
  try{
    var apiBase=window.location.pathname.startsWith('/finance/')?'/finance':'';
    var r=await fetch(apiBase+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    var d=await r.json();
    if(d.token){localStorage.setItem('wyx_token',d.token);localStorage.setItem('wyx_user',d.username);window.location.href=apiBase+'/admin.html';}
    else errEl.textContent=d.error||'用户名或密码错误';
  }catch(e){errEl.textContent='网络错误，请检查连接';}
  loadEl.textContent='';btn.disabled=false;btn.textContent='登 录';
}
if(localStorage.getItem('wyx_token')){window.location.href=(window.location.pathname.startsWith('/finance/')?'/finance':'')+'/admin.html';}
</script>
</body>
</html>
