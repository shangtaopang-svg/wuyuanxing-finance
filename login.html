<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>五源兴 · 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New','PingFang SC',monospace;background:#f5f0e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border:4px solid #000;padding:40px;width:90%;max-width:380px;box-shadow:10px 10px 0 rgba(0,0,0,0.15)}
.login-box h1{font-size:1.2rem;font-weight:900;text-align:center;margin-bottom:6px}
.login-box .sub{text-align:center;font-size:0.72rem;color:#888;margin-bottom:24px;font-weight:600}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.75rem;font-weight:800;margin-bottom:4px}
.form-group input{width:100%;padding:10px 12px;border:3px solid #000;font-size:0.85rem;font-family:inherit;font-weight:600}
.form-group input:focus{outline:none;box-shadow:4px 4px 0 #D35400}
.btn-login{width:100%;padding:12px;background:#000;color:#fff;border:3px solid #000;font-size:0.9rem;font-weight:900;font-family:inherit;cursor:pointer;letter-spacing:0.05em}
.btn-login:hover{background:#D35400;border-color:#D35400}
.error{color:#c0392b;font-size:0.78rem;font-weight:700;text-align:center;margin-top:8px;min-height:1.2em}
.loading{text-align:center;font-size:0.78rem;color:#888;margin-top:8px}
</style>
</head>
<body>
<div class="login-box">
  <h1>🌾 五源兴</h1>
  <p class="sub">财务管理后台</p>
  <div class="form-group"><label>用户名</label><input type="text" id="username" value="admin" autocomplete="off"></div>
  <div class="form-group"><label>密码</label><input type="password" id="password" placeholder="admin123" onkeydown="if(event.key==='Enter')login()"></div>
  <button class="btn-login" onclick="login()">登 录</button>
  <div class="error" id="loginError"></div>
  <div class="loading" id="loginLoading"></div>
</div>
<script>
async function login(){
  const u=document.getElementById('username').value;
  const p=document.getElementById('password').value;
  document.getElementById('loginError').textContent='';
  document.getElementById('loginLoading').textContent='登录中...';
  try{
    var apiBase = window.location.pathname.startsWith('/finance/') ? '/finance' : '';
    const r=await fetch(apiBase + '/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.token){localStorage.setItem('wyx_token',d.token);localStorage.setItem('wyx_user',d.username);window.location.href='admin.html';}
    else document.getElementById('loginError').textContent=d.error||'登录失败';
  }catch(e){document.getElementById('loginError').textContent='网络错误';}
  document.getElementById('loginLoading').textContent='';
}
// 如果已有token，直接跳转
if(localStorage.getItem('wyx_token')){window.location.href='admin.html';}
</script>
</body>
</html>
